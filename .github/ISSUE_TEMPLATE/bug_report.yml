name: Bug Report
description: Report an issue with the site or infrastructure
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - blackboxprogramming
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. This is a proprietary project — BlackRoad OS, Inc.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
